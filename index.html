<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daar-om HR — Interne Omgeving</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Daar-om.nl kleuren — exact overgenomen van de website */
  --teal:        #1E9CBF;
  --teal-dark:   #157A98;
  --teal-light:  #E8F7FB;
  --orange:      #F05A28;
  --orange-dark: #C8421A;
  --navy:        #0B1F2A;
  --navy-2:      #0D2B33;
  --navy-3:      #1A3A47;
  --dark:        #0D2B33;
  --dark-2:      #1F4D5C;
  --muted:       #6B8E9A;
  --muted-2:     #9BBAC6;
  --bg:          #F2F6F8;
  --surface:     #FFFFFF;
  --border:      #E2ECF0;
  --success:     #1A7A50;
  --success-bg:  #E0F5EC;
  --danger:      #C03030;
  --danger-bg:   #FDEAEA;
  --warn:        #8A5800;
  --warn-bg:     #FFF4DC;
  --blue:        #1E9CBF;
  --blue-dark:   #157A98;
  --blue-light:  #E8F7FB;
  --blue-lighter:#F2FAFD;
  --sidebar-w:   240px;
  --radius:      6px;
}

body { font-family: "Plus Jakarta Sans", sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; font-size: 14px; line-height: 1.6; }

.ai-cite { display: none !important; }

#app-screen { min-height: 100vh; display: flex; }

/* ── SIDEBAR — navy zoals daar-om.nl navigatie ── */
.sidebar {
  width: var(--sidebar-w); background: var(--navy);
  display: flex; flex-direction: column;
  position: fixed; top:0; left:0; bottom:0; z-index:100;
  border-right: 1px solid rgba(255,255,255,.06);
}

.logo { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,.08); }
.logo-sub { font-size:9px; color:rgba(255,255,255,.35); letter-spacing:1.2px; text-transform:uppercase; margin-top:6px; font-weight:600; }

nav { padding:12px 10px; flex:1; overflow-y:auto; }
.nav-section { margin-bottom:24px; }
.collega-card { user-select:none; }
.collega-card.geselecteerd { border-color:var(--teal) !important; background:var(--teal-light) !important; transform:scale(1.04); box-shadow:0 4px 14px rgba(30,156,191,.2); }
.nav-label { font-size:9px; font-weight:700; color:rgba(255,255,255,.45); letter-spacing:1.4px; text-transform:uppercase; padding:0 10px; margin-bottom:4px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:6px; cursor:pointer; color:rgba(255,255,255,.8); font-size:13px; font-weight:500; transition:all .15s; margin-bottom:2px; border:none; background:none; width:100%; text-align:left; font-family:inherit; }
.nav-item:hover { background:var(--orange); color:#fff; }
.nav-item.active { background:var(--orange); color:#fff; font-weight:700; }
.nav-item .icon { width:17px; height:17px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

.sidebar-user { padding:16px 20px; border-top:1px solid rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center; }
.user-av { width:34px; height:34px; border-radius:50%; background:var(--teal); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
.user-name { font-size:13px; font-weight:600; color:#fff; }
.user-role { font-size:11px; color:rgba(255,255,255,.4); }

/* ── MAIN CONTENT ── */
.main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }
.topbar { background:var(--navy); padding:0 32px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; border-bottom:1px solid rgba(255,255,255,.08); }
.page-title { font-size:15px; font-weight:700; color:#fff; letter-spacing:-.2px; }
.topbar-right { display:flex; align-items:center; gap:10px; }
.btn { padding:8px 16px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.1); color:#fff; font-family:inherit; transition:all .12s; }
.btn:hover { background:rgba(255,255,255,.18); }
.btn-white { background:#fff; color:var(--navy); border-color:#fff; font-weight:700; }
.btn-white:hover { background:#E8F7FB; }

.content { padding:32px; flex:1; background:var(--bg); }

/* ── BANNERS — compact, stijl van daar-om.nl ── */
.welcome-banner {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-3) 100%);
  border-radius: 6px; padding: 12px 18px; margin-bottom: 18px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 14px; border: 1px solid rgba(255,255,255,.08);
}
.welcome-banner::before { display:none; }
.welcome-banner::after  { display:none; }
.wb-left { position:relative; z-index:1; }
.wb-greeting { display:none; }
.wb-name { font-size:15px; font-weight:800; color:#fff; letter-spacing:-.3px; margin:0; }
.wb-sub  { font-size:12px; color:rgba(255,255,255,.55); line-height:1.5; margin-top:3px; }

/* ── KAARTEN — wit op lichtgrijze achtergrond, strak ── */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.06); transition:box-shadow .15s; }
.card:hover { box-shadow:0 4px 16px rgba(0,0,0,.1); }
.card-header { padding:14px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:#fff; }
.card-title { font-size:13px; font-weight:700; color:var(--dark); text-transform:uppercase; letter-spacing:.4px; }
.card-body  { padding:18px 20px; }

.ag-row { display:flex; gap:14px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); }
.ag-row:last-child { border-bottom:none; }
.ag-date { min-width:42px; text-align:center; background:var(--blue-light); border-radius:8px; padding:5px 4px; flex-shrink:0; }
.ag-day   { font-size:19px; font-weight:700; line-height:1; color:var(--blue); }
.ag-month { font-size:10px; color:var(--blue-dark); font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
.ag-label { font-size:13px; font-weight:600; color:var(--dark); padding-top:3px; }
.ag-sub   { font-size:12px; color:var(--muted-2); }

.table { width:100%; border-collapse:collapse; }
.table th { text-align:left; font-size:10.5px; font-weight:700; color:var(--muted-2); text-transform:uppercase; letter-spacing:.7px; padding:0 0 10px; border-bottom:1px solid var(--border); }
.table td { padding:10px 0; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; }
.table tr:last-child td { border-bottom:none; }

.gids-layout { display:grid; grid-template-columns:220px 1fr; gap:24px; align-items:start; }
.gids-nav { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; position:sticky; top:86px; box-shadow:0 1px 4px rgba(14,90,115,.08); }
.gids-nav-header { padding:14px 16px; border-bottom:1px solid var(--border); font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; background:var(--blue-lighter); }
.gids-nav-item { display:flex; align-items:center; gap:8px; padding:10px 16px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--border); color:var(--dark-2); transition:all .12s; border-left:3px solid transparent; }
.gids-nav-item:last-child { border-bottom:none; }
.gids-nav-item:hover { background:#EBF7FB; }
.gids-nav-item.active { background:#EBF7FB; color:var(--teal-dark); font-weight:700; border-left-color:var(--orange); }
.gids-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:0 1px 4px rgba(14,90,115,.08); margin-bottom:16px; }
.gids-section-header { padding:18px 22px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:linear-gradient(135deg,var(--blue-lighter) 0%,#fff 100%); }
.gids-icon { width:38px; height:38px; border-radius:10px; background:var(--blue-light); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; border:1px solid var(--border); }
.gids-section-title { font-size:15px; font-weight:700; color:var(--dark); }
.gids-section-sub   { font-size:12px; color:var(--muted); margin-top:2px; }
.gids-body { padding:20px 22px; }
.regel-item { padding:14px 0; border-bottom:1px solid var(--border); }
.regel-item:last-child { border-bottom:none; }
.regel-title { font-size:13.5px; font-weight:700; margin-bottom:5px; color:var(--dark); }
.regel-text  { font-size:13px; color:var(--muted); line-height:1.65; }

.calendar-wrapper { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:0 1px 4px rgba(14,90,115,.08); }
.cal-header { display:flex; justify-content:space-between; align-items:center; padding:16px 24px; background:#fff; border-bottom:1px solid var(--border); }
.cal-btn { background:white; border:1px solid var(--border); border-radius:20px; padding:7px 16px; cursor:pointer; font-size:13px; font-weight:600; color:var(--dark-2); transition:all .15s; }
.cal-btn:hover { background:var(--orange); color:white; border-color:var(--orange); }
.cal-title { font-size:20px; font-weight:700; color:var(--dark); text-transform:capitalize; letter-spacing:-.3px; }
.cal-days { display:grid; grid-template-columns:repeat(7,1fr); background:var(--bg); border-bottom:1px solid var(--border); }
.cal-day-name { text-align:center; padding:12px 0; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
.cal-dates { display:grid; grid-template-columns:repeat(7,1fr); }
.cal-date { min-height:120px; padding:8px 6px 6px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:4px; }
.cal-date:nth-child(7n) { border-right:none; }
.cal-date.empty { background:#FAFBFB; }
.cal-date.weekend { background:#F9FAFB; }
.cal-date-num { font-size:13px; font-weight:500; color:var(--dark-2); display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; align-self:flex-start; margin-bottom:2px; }
.cal-date.today .cal-date-num { background:var(--orange); color:white; font-weight:700; }
.evt-badge { font-size:11.5px; font-weight:600; padding:3px 8px 3px 6px; border-radius:4px; line-height:1.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:left; display:flex; align-items:center; gap:4px; width:100%; }
.evt-holiday { background:#DCFCE7; color:#166534; border:none; font-weight:600; }
.evt-office { background:#FEF9C3; color:#854D0E; border:none; font-weight:600; }
.evt-routine { background:#EEF2FF; color:#4338CA; border:none; font-weight:600; }

/* TEAM GRID */
.team-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:20px; margin-top:20px; }
.team-card { background:white; border:1px solid var(--border); border-radius:14px; padding:24px 16px 20px; text-align:center; box-shadow:0 2px 8px rgba(14,90,115,.06); transition:transform 0.2s, box-shadow 0.2s; }
.team-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.12); }
.team-av { width:90px; height:90px; border-radius:50%; margin:0 auto 14px; border:3px solid var(--blue-light); overflow:hidden; background:var(--blue); display:flex; align-items:center; justify-content:center; }
.team-av img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; }
.team-name { font-size:14px; font-weight:700; color:var(--dark); margin-bottom:6px; line-height:1.3; }
.team-role { font-size:11.5px; color:var(--muted); background:var(--bg); display:inline-block; padding:4px 10px; border-radius:12px; font-weight:600; line-height:1.4; }

.idea-form { max-width:600px; background:white; border:1px solid var(--border); border-radius:12px; padding:24px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:12px; font-weight:700; color:var(--dark-2); margin-bottom:6px; }
.form-group input[type="text"], .form-group textarea { width:100%; padding:12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:inherit; transition:border-color 0.2s; }
.form-group input[type="text"]:focus, .form-group textarea:focus { border-color:var(--blue); outline:none; }
.form-group textarea { resize:vertical; min-height:120px; }

.alert { display:flex; align-items:flex-start; gap:10px; padding:11px 13px; border-radius:8px; margin-bottom:8px; border-left:3px solid transparent; }
.alert:last-child { margin-bottom:0; }
.alert-title { font-weight:600; font-size:13px; color:var(--dark); }
.alert-sub   { color:var(--muted); font-size:12px; margin-top:2px; }
.al-blue  { background:#EBF7FB; border-color:var(--teal); }
.al-amber { background:var(--warn-bg);     border-color:#D09000; }
.al-green { background:var(--success-bg);  border-color:var(--success); }
.al-orange { background:#FFF0E8; border-color:var(--orange); }

@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
#chat-panel { position:fixed; bottom:88px; right:24px; width:360px; height:540px; background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:0 8px 40px rgba(14,90,115,.2); display:none; flex-direction:column; z-index:200; overflow:hidden; animation:slideUp .2s ease; }
#chat-fab { position:fixed; bottom:24px; right:24px; width:52px; height:52px; border-radius:50%; background:var(--blue); color:white; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 4px 20px rgba(30,156,191,.4); z-index:201; transition:transform .2s, box-shadow .2s; }
#chat-fab:hover { box-shadow:0 6px 28px rgba(30,156,191,.55); }
</style>
</head>
<body>

<div id="app-screen">
  <aside class="sidebar">
    <div class="logo">
      <svg width="148" height="36" viewBox="0 0 148 36" fill="none">
        <text x="0" y="25" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="24" fill="white" letter-spacing="-0.5">daar-</text>
        <text x="67" y="25" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="24" fill="#1E9CBF" letter-spacing="-0.5">om</text>
        <circle cx="103" cy="13" r="7" fill="#1E9CBF"/>
        <circle cx="103" cy="13" r="4.5" fill="rgba(255,255,255,0.25)"/>
        <text x="109" y="25" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="24" fill="white" letter-spacing="-0.5">.nl</text>
      </svg>
      <div class="logo-sub">Interne Omgeving</div>
    </div>
    <nav id="sidebar-nav"></nav>

</div>

<button id="chat-fab" onclick="toggleChat()" title="Stel een HR-vraag"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>

<div id="chat-panel">
  <div style="background:var(--blue);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px;"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M9 11V7a3 3 0 0 1 6 0v4"/><circle cx="9" cy="16" r="1" fill="currentColor"/><circle cx="15" cy="16" r="1" fill="currentColor"/><path d="M9.5 21h5"/></svg></div>
      <div>
        <div style="font-size:13.5px;font-weight:700;color:#fff">HR-assistent</div>
        <div style="font-size:11px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:4px">
          <span style="width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block"></span>
          daar-om.nl
        </div>
      </div>
    </div>
    <button onclick="toggleChat()" style="background:rgba(255,255,255,.15);border:none;color:white;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">×</button>

    <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px">Snel antwoord op:</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">
      <button onclick="quickAsk('Hoe meld ik me ziek?')" style="font-size:11px;padding:4px 9px;border-radius:12px;border:1px solid var(--border);background:white;cursor:pointer;color:var(--dark-2);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px;"><path d="M4.5 6.5a7 7 0 1 1 11 5.77V20a2 2 0 0 1-4 0v-1h-2v1a2 2 0 0 1-4 0v-7.73A7 7 0 0 1 4.5 6.5z"/></svg> Ziek melden</button>

      <button onclick="quickAsk('Hoe declareer ik onkosten?')" style="font-size:11px;padding:4px 9px;border-radius:12px;border:1px solid var(--border);background:white;cursor:pointer;color:var(--dark-2);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px;"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1z"/><path d="M16 8H8m8 4H8m8 4H8"/></svg> Declareren</button>

async function submitIdea() {
  const title  = document.getElementById('idea-title').value.trim();
  const desc   = document.getElementById('idea-desc').value.trim();
  const anon   = document.getElementById('idea-anon').checked;
  const btn    = document.querySelector('[onclick="submitIdea()"]');

  if (!title || !desc) { alert('Vul aub een onderwerp en een beschrijving in!'); return; }

  // Knop uitschakelen tijdens verzenden
  btn.disabled = true;
  btn.textContent = 'Versturen...';

  try {
    const response = await fetch('https://formspree.io/f/mqegvydn', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        onderwerp: 'Ideeënbus: ' + title,
        titel:     title,
        idee:      desc,
        anoniem:   anon ? 'Ja' : 'Nee'
      })
    });

    if (response.ok) {
      document.getElementById('idea-title').value  = '';
      document.getElementById('idea-desc').value   = '';
      document.getElementById('idea-anon').checked = false;
      document.getElementById('idea-success').style.display = 'block';
      document.getElementById('idea-error').style.display   = 'none';
      setTimeout(() => { document.getElementById('idea-success').style.display = 'none'; }, 6000);
    } else {
      document.getElementById('idea-error').style.display = 'block';
    }
  } catch (err) {
    document.getElementById('idea-error').style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Idee Versturen <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  }
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  const title   = document.getElementById('cal-title');
  const datesEl = document.getElementById('cal-dates');
  if (!datesEl) return;
  const monthNames = ["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];
  title.textContent = monthNames[currentMonth] + " " + currentYear;
  let firstDay = new Date(currentYear, currentMonth, 1).getDay();
  if (firstDay === 0) firstDay = 7;
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  let html = '';
  for (let i = 1; i < firstDay; i++) html += '<div class="cal-date empty"></div>';
  const today = new Date(2026, 3, 9);
  for (let i = 1; i <= daysInMonth; i++) {
    const isToday   = (i === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) ? 'today' : '';
    const dow       = new Date(currentYear, currentMonth, i).getDay();
    const isWeekend = (dow === 0 || dow === 6) ? 'weekend' : '';
    const dateStr   = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    let eventsHtml  = '';
    if (dow >= 1 && dow <= 5) {
      if (dow === 1) eventsHtml += `<div class="evt-badge evt-routine"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px;"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg> Weekstart (08:30)</div>`;
      if (dow === 5) eventsHtml += `<div class="evt-badge evt-office"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px;"><path d="M17 11h1a3 3 0 0 1 0 6h-1"/><path d="M9 12v6"/><path d="M13 12v6"/><path d="M14 7.5c-1 0-1.44.5-3 .5s-2-.5-3-.5-1.72.5-2.5.5a2.5 2.5 0 0 1 0-5c.78 0 1.57.5 2.5.5S9.44 3 11 3s2 .5 3 .5 1.72-.5 2.5-.5a2.5 2.5 0 0 1 0 5c-.78 0-1.5-.5-2.5-.5z"/></svg> VrijMiBo (16:00)</div>`;
    }
    if (kalenderData[dateStr]) {
      kalenderData[dateStr].forEach(evt => {
        const cls  = evt.type === 'holiday' ? 'evt-holiday' : 'evt-office';

function gNav(el, id) {
  document.querySelectorAll('.gids-nav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  const target = document.getElementById('gs-' + id);
  if (target) target.scrollIntoView({behavior:'smooth', block:'start'});
}

function gs(id, icon, title, sub, body) {
  return `<div class="gids-section" id="gs-${id}" style="margin-bottom:16px">
    <div class="gids-section-header"><div class="gids-icon">${icon}</div><div><div class="gids-section-title">${title}</div><div class="gids-section-sub">${sub}</div></div></div>
    <div class="gids-body">${body}</div></div>`;
}

function ri(title, text) {
  return `<div class="regel-item"><div class="regel-title">${title}</div><div class="regel-text">${text}</div></div>`;

  return `<div style="background:var(--blue-lighter);padding:12px;border-radius:8px;border:1px solid var(--border);">

}

const currentWinner = null; // Nog niet gekozen — vul hier de winnaar in als het zover is

const avatarColors = ["#1E9CBF","#F05A28","#1A7A50","#7B5EA7","#157A98","#C8421A","#2BA8C8","#8A5800"];
function getAvatarColor(naam) {
  let hash = 0;
  for (let c of naam) hash += c.charCodeAt(0);
  return avatarColors[hash % avatarColors.length];
}

function buildColleagaCards() {
  return allCollegas.map(c => {
    const color = getAvatarColor(c.naam);
    return `<div class="collega-card" onclick="kiesCollega('${c.naam.replace(/'/g, "\'")}','${color}')"
      style="border:2px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s;background:white;"
      onmouseover="this.style.borderColor='var(--blue)';this.style.background='var(--blue-lighter)'"
      onmouseout="if(!this.classList.contains('geselecteerd')){this.style.borderColor='var(--border)';this.style.background='white'}">

      <div style="font-size:10px;color:var(--muted);margin-top:2px;">${c.functie}</div>
    </div>`;
  }).join('');
}

function kiesCollega(naam, color) {
  geselecteerdeCollega = naam;

  // Alle kaarten resetten, gekozen markeren
  document.querySelectorAll('.collega-card').forEach(card => {
    card.classList.remove('geselecteerd');
    card.style.borderColor = 'var(--border)';
    card.style.background  = 'white';
    card.style.transform   = '';
  });
  event.currentTarget.classList.add('geselecteerd');
  event.currentTarget.style.borderColor = 'var(--blue)';
  event.currentTarget.style.background  = 'var(--blue-lighter)';
  event.currentTarget.style.transform   = 'scale(1.04)';

  // Vul stap 2 in
  document.getElementById('nom-gekozen-naam').textContent   = naam;
  document.getElementById('nom-gekozen-avatar').style.background = color;
  document.getElementById('nom-gekozen-avatar').textContent = naam.charAt(0);
  document.getElementById('nom-reden').value                = '';
  document.getElementById('nom-reden-error').style.display  = 'none';

  // Toon stap 2
  const stap2 = document.getElementById('nom-stap2');
  stap2.style.display = 'block';
  stap2.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  document.getElementById('nom-kies-error').style.display = 'none';
}

function resetNominatie() {
  geselecteerdeCollega = null;
  document.querySelectorAll('.collega-card').forEach(card => {
    card.classList.remove('geselecteerd');
    card.style.borderColor = 'var(--border)';
    card.style.background  = 'white';
    card.style.transform   = '';
  });
  document.getElementById('nom-stap2').style.display   = 'none';
  document.getElementById('nom-success').style.display = 'none';
}

function submitNominatie() {
  const reden = document.getElementById('nom-reden').value.trim();
  const err   = document.getElementById('nom-reden-error');
  err.style.display = 'none';

  if (!geselecteerdeCollega) {
    document.getElementById('nom-kies-error').style.display = 'block';
    document.getElementById('nom-stap1').scrollIntoView({ behavior: 'smooth' });
    return;
  }
  if (!reden) {
    err.style.display = 'block';
    return;
  }

  // Stuur via mailto naar Ericka
  const onderwerp = encodeURIComponent('Nominatie Medewerker van de Maand — ' + geselecteerdeCollega);
  const body      = encodeURIComponent(
    'Hallo Ericka,\n\n' +
    'Ik nomineer ' + geselecteerdeCollega + ' als Medewerker van de Maand.\n\n' +
    'Reden:\n' + reden + '\n\n' +
    '(Verstuurd via het HR Portaal)'
  );
  window.location.href = 'mailto:ericka@daar-om.nl?subject=' + onderwerp + '&body=' + body;

  // Toon succes
  document.getElementById('nom-success').style.display = 'block';
  document.getElementById('nom-stap2').style.display   = 'none';
  resetNominatie();
}

  const msgs = document.getElementById('chat-messages');
  const div  = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:flex-start;justify-content:flex-end;margin-bottom:12px';
  div.innerHTML = `<div style="background:var(--blue);border-radius:10px 0 10px 10px;padding:10px 13px;font-size:13px;color:#fff;line-height:1.6;max-width:85%">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const msg   = input.value.trim();
  if (!msg) return;

  input.value   = '';
  input.disabled = true;

  addUserMessage(msg);
  chatHistory.push({ role: 'user', content: msg });
  addTypingIndicator();

  // Bouw Gemini conversatie op met HR context als eerste bericht
  const berichten = [];
  if (chatHistory.length === 1) {
    berichten.push({
      role: 'user',
      parts: [{ text: HR_CONTEXT + '\n\nVraag: ' + msg }]
    });
  } else {
    berichten.push({
      role: 'user',
      parts: [{ text: HR_CONTEXT + '\n\nVraag: ' + chatHistory[0].content }]
    });
    for (let i = 1; i < chatHistory.length; i++) {
      berichten.push({
        role: chatHistory[i].role === 'assistant' ? 'model' : 'user',
        parts: [{ text: chatHistory[i].content }]
      });
    }
  }

  try {
    const res  = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: berichten,
        generationConfig: { maxOutputTokens: 400, temperature: 0.2 }
      })
    });

    const data  = await res.json();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text;

    if (!reply) throw new Error('Geen antwoord');

    chatHistory.push({ role: 'assistant', content: reply });

    const typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();

    const opgemaakt = reply
      .replace(/[*][*](.*?)[*][*]/g, '<b>$1</b>')
      .replace(/[*](.*?)[*]/g, '$1')
      .replace(/\n/g, '<br>');

    addBotMessage(opgemaakt);

  } catch (err) {
    const typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();
    addBotMessage('Er is een verbindingsfout. Stel je vraag aan <b>Ericka</b>: <a href="mailto:ericka@daar-om.nl" style="color:var(--teal);">ericka@daar-om.nl</a>');
  } finally {
    input.disabled = false;
    input.focus();
  }
}
